# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest
    env:
      PAGES_DEPLOY_TOKEN: ${{ secrets.PAGES_DEPLOY_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare site
        run: |
          mkdir -p site/css site/js
          cp gita.html site/index.html
          cp css/gita.css site/css/
          cp js/gita.js site/js/
          cp js/shlokas.js site/js/

      - name: Setup Pages (auto-enable if token is available)
        if: ${{ env.PAGES_DEPLOY_TOKEN != '' }}
        id: setup_pages_auto
        uses: actions/configure-pages@v5
        with:
          enablement: true
          token: ${{ env.PAGES_DEPLOY_TOKEN }}

      - name: Setup Pages
        if: ${{ env.PAGES_DEPLOY_TOKEN == '' }}
        id: setup_pages_manual
        continue-on-error: true
        uses: actions/configure-pages@v5

      - name: Explain missing Pages setup
        if: ${{ env.PAGES_DEPLOY_TOKEN == '' && steps.setup_pages_manual.outcome == 'failure' }}
        run: |
          echo "GitHub Pages is not enabled for this repository yet."
          echo "Enable Pages in Settings > Pages and choose GitHub Actions as the source,"
          echo "or add a PAGES_DEPLOY_TOKEN repository secret so this workflow can enable Pages automatically."
          exit 1

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
